<!DOCTYPE html>
<html>
<head>
  <title>Threat Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <h1>Threat Intelligence Dashboard</h1>

  <div style="display:flex; gap:20px; margin:20px 0; flex-wrap:wrap;">
    <div style="border:1px solid #ccc; padding:20px; width:200px;">
      <h3>Total Reports</h3>
      <p id="totalReports">0</p>
    </div>

    <div style="border:1px solid #ccc; padding:20px; width:200px;">
      <h3>Active Threats</h3>
      <p id="activeThreats">2</p>
    </div>

    <div style="border:1px solid #ccc; padding:20px; width:200px;">
      <h3>Registered Users</h3>
      <p id="totalUsers">1</p>
    </div>
  </div>

  <h2>Live Threat Feed</h2>
  <div id="threat-feed"></div>

  <button onclick="logoutUser()">Logout</button>
  <button onclick="deleteAccount()">Delete Account</button>
  <button onclick="window.location.href='report.html'">Report Fraud</button>
  <button onclick="window.location.href='reports.html'">View Reports</button>
  <button onclick="window.location.href='adminReports.html'">Manage Reports</button>

  <script src="./js/threatFeed.js"></script>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    function logoutUser() {
      localStorage.removeItem("token");
      localStorage.removeItem("username");
      window.location.href = "login.html";
    }

    async function deleteAccount() {
      const username = localStorage.getItem("username");

      const res = await fetch("/api/delete-account", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username })
      });

      const data = await res.json();
      alert(data.message);

      localStorage.removeItem("token");
      localStorage.removeItem("username");
      window.location.href = "login.html";
    }

    async function loadReportCount() {
      try {
        const res = await fetch("/api/reports");
        const reports = await res.json();
        document.getElementById("totalReports").innerText = reports.length;
      } catch (error) {
        console.log(error);
      }
    }

    loadReportCount();
  </script>

</body>
</html>
